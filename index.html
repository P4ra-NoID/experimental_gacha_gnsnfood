<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>原神料理ガチャ</title>

<style>

body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  background: linear-gradient(to bottom, #f8f2e8, #eadfcb);
  font-family: sans-serif;
  color: #4a3422;
  -webkit-text-size-adjust: 100%;
  touch-action: manipulation;
}

.container {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 20px;
}

h1 {
  font-size: 42px;
  margin-bottom: 10px;
}

.subtitle {
  font-size: 20px;
  margin-bottom: 20px;
}

button {
  background: #c98c3a;
  color: white;
  border: none;
  border-radius: 999px;
  padding: 14px 34px;
  font-size: 18px;
  cursor: pointer;
  margin: 10px;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
}

.sound-toggle {
  position: fixed;
  top: 15px;
  right: 15px;
  width: 50px;
  height: 50px;
  border-radius: 999px;
  border: none;
  background: rgba(255,255,255,0.9);
  font-size: 22px;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.15);
  z-index: 999;

  display: flex;
  align-items: center;
  justify-content: center;

  padding: 0;
  margin: 0;
  line-height: 1;
}

.note {
  margin-top: 15px;
  background: #ffffff;
  border: 2px solid #eee;
  border-radius: 16px;
  padding: 15px 20px;
  font-size: 13px;
  line-height: 1.6;
  color: #4a3422;
  max-width: 320px;
  white-space: pre-line;
}

.card {
  margin-top: 20px;
  background: rgba(255,255,255,0.9);
  border-radius: 24px;
  padding: 25px;
  max-width: 90%;
  display: none;
}

.card img {
  width: 100%;
  max-width: 320px;
  border-radius: 18px;
  margin-bottom: 20px;
}

.food-name {
  font-size: 26px;
  font-weight: bold;
  margin-bottom: 10px;
}

.flavor {
  line-height: 1.8;
  margin-bottom: 15px;
}

a {
  display: inline-block;
  text-decoration: none;
  background: #8b5e34;
  color: white;
  padding: 10px 20px;
  border-radius: 999px;
}

#againBtn, #backBtn {
  display: none;
}

.credit {
  text-align: center;
  font-size: 12px;
  opacity: 0.7;
  padding: 10px 0 20px;
}

.credit a {
  color: #BB88EE;
  text-decoration: none;
}

</style>
</head>

<body>

<button class="sound-toggle" onclick="toggleSound()" id="soundToggle">
🔉
</button>

<div class="container">

  <h1>原神料理ガチャ</h1>

  <div class="subtitle">
    何が出るかな？
  </div>

  <button id="drawBtn" onclick="drawFood()">
    1回注文する
  </button>

  <div class="note">
食い意地から生まれた暇つぶし個人的サイトです！
初心者なのでUIが終わっています。許して  
あまり難しく考えず、気軽にポチポチしてください✌️
※現在排出されるのは美味しい料理のみで、
オリジナル料理は提供されません。
⚠️出典はHoYowikiからです
公式や他のサイトとは一切関係ありません
  </div>

  <div class="card" id="card">

    <img id="foodImage" src="" referrerpolicy="no-referrer">

    <div class="food-name" id="foodName"></div>

    <div class="flavor" id="foodFlavor"></div>

    <a id="foodLink" href="" target="_blank">
      Hoyowikiを見る
    </a>

  </div>

  <button id="againBtn" onclick="drawFood()">
    もう1回注文する
  </button>

  <button id="backBtn" onclick="backToTitle()">
    タイトルにもどる
  </button>

</div>

<div class="credit">
  不具合報告など↓<br>
  製作者：春もち【観葉植物】<br>
  Twitter：
  <a href="https://twitter.com/ech_oni3" target="_blank">@ech_oni3</a>
</div>

<audio id="sound32" src="click/click32.mp3"></audio>
<audio id="sound48" src="click/click48.mp3"></audio>

 /*モンド*/

  link:"https://wiki.hoyolab.com/pc/genshin/entry/6695?lang=ja-jp"

    flavor:"パイモンが目を瞑り、長いこと思い悩んだ末に改良したアランナラ料理だが──実はスメールで古くから流行していた調理法。独自の香料の加え方により、素材そのものの味が引き出されている。このおかげで味覚が少し刺激され、味がより豊かになった…チーズボールの外側のカリッとした食感と内側のやわらかい食感が、熱々のポテトの食感と補い合っている。",

function drawFood() {

  if (soundEnabled) {
    document.getElementById("click32").currentTime = 0;
    document.getElementById("click32").play();
  }

  let index;

  do {
    index = Math.floor(Math.random() * foods.length);
  } while (index === lastIndex);

  lastIndex = index;

  const food = foods[index];

  document.getElementById("foodImage").src = food.image;
  document.getElementById("foodName").textContent = food.name;
  document.getElementById("foodFlavor").textContent = food.flavor;
  document.getElementById("foodLink").href = food.link;

  document.getElementById("card").style.display = "block";
  document.getElementById("drawBtn").style.display = "none";
  document.getElementById("againBtn").style.display = "inline-block";
  document.getElementById("backBtn").style.display = "inline-block";

  document.querySelector(".note").style.display = "none";
}

function backToTitle() {

  if (soundEnabled) {
    document.getElementById("click48").currentTime = 0;
    document.getElementById("click48").play();
  }

  document.getElementById("card").style.display = "none";
  document.getElementById("drawBtn").style.display = "inline-block";
  document.getElementById("againBtn").style.display = "none";
  document.getElementById("backBtn").style.display = "none";

  document.querySelector(".note").style.display = "block";
}

function toggleSound() {

  soundEnabled = !soundEnabled;

  document.getElementById("soundToggle").textContent =
    soundEnabled ? "🔉" : "🔇";
}

</script>

</body>
</html>
