<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>原神料理ガチャ</title>

<style>

body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  background: linear-gradient(to bottom, #f8f2e8, #eadfcb);
  font-family: sans-serif;
  color: #4a3422;
  -webkit-text-size-adjust: 100%;
  touch-action: manipulation;
}

/* ★ここが重要：ちゃんと中央寄せ復活 */
.container {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 20px;
  transform: translateZ(0);
}

h1 {
  font-size: 42px;
  margin-bottom: 10px;
}

.subtitle {
  font-size: 20px;
  margin-bottom: 20px;
}

button {
  background: #c98c3a;
  color: white;
  border: none;
  border-radius: 999px;
  padding: 14px 34px;
  font-size: 18px;
  cursor: pointer;
  margin: 10px;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
}

/* コメントボックス（改行指定どおり） */
.note {
  margin-top: 15px;
  background: #ffffff;
  border: 2px solid #eee;
  border-radius: 16px;
  padding: 15px 20px;
  font-size: 13px;
  line-height: 1.6;
  color: #4a3422;
  max-width: 320px;
  white-space: pre-line; /* ←改行をそのまま反映 */
}

.card {
  margin-top: 20px;
  background: rgba(255,255,255,0.9);
  border-radius: 24px;
  padding: 25px;
  max-width: 90%;
  display: none;
}

.card img {
  width: 100%;
  max-width: 320px;
  border-radius: 18px;
  margin-bottom: 20px;
}

.food-name {
  font-size: 26px;
  font-weight: bold;
  margin-bottom: 10px;
}

.flavor {
  line-height: 1.8;
  margin-bottom: 15px;
}

a {
  display: inline-block;
  text-decoration: none;
  background: #8b5e34;
  color: white;
  padding: 10px 20px;
  border-radius: 999px;
}

#againBtn, #backBtn {
  display: none;
}

/* クレジット（コメント直下） */
.credit {
  text-align: center;
  font-size: 12px;
  opacity: 0.7;
  padding: 10px 0 20px;
}

.credit a {
  color: #BB88EE;
  text-decoration: none;
}

.credit a:hover {
  opacity: 0.9;
}

</style>
</head>

<body>

<div class="container">

  <h1>原神料理ガチャ</h1>

  <div class="subtitle">
    きょうの注文は何かな？
  </div>

  <button id="drawBtn" onclick="drawFood()">
    1回注文する
  </button>

  <!-- ★改行完全指定版 -->
  <div class="note">
食い意地から生まれたサイトです！<br>
あまり難しく考えず、気軽にポチポチしてください✌️<br>
※現在排出されるのは美味しい料理のみで、<br>
オリジナル料理は提供されません！
  </div>

  <div class="card" id="card">

    <img id="foodImage" src="" referrerpolicy="no-referrer">

    <div class="food-name" id="foodName"></div>

    <div class="flavor" id="foodFlavor"></div>

    <a id="foodLink" href="" target="_blank">
      HoyoLABwikiを見る
    </a>

  </div>

  <button id="againBtn" onclick="drawFood()">
    もう1回注文する
  </button>

  <button id="backBtn" onclick="backToTitle()">
    タイトルにもどる
  </button>

</div>

<!-- ★クレジットはコメント直下 -->
<div class="credit">
  製作者：春もち【観葉植物】<br>
  Twitter：
  <a href="https://twitter.com/ech_oni3" target="_blank">
    @ech_oni3
  </a>
</div>

<script>

const foods = [

  {
    name: "美味しそうなポテトボート",
    image: "https://upload-static.hoyoverse.com/hoyolab-wiki/2023/01/26/194600931/ad584297947ddc7f504fa006d96087f4_7199494019389018772.png",
    flavor: "焼き上げたお菓子。砂金の川のように流れ出す魅力的なチーズが香りを凝縮し、美味しいルッカデヴァータダケと繊細で柔らかいジャガイモを運んでくれる。口に入れれば、まるで船に乗って、川をのんびり漂っているかのような気分に。この美食の旅が少しでも長く続きますように…",
    link: "https://wiki.hoyolab.com/m/genshin/entry/3376?lang=ja-jp"
  },

  {
    name: "美味しそうなポートフィッシュバーガー",
    image: "https://act-webstatic.hoyoverse.com/event-static-hoyowiki-admin/2026/04/07/c3e8bb38461133917e89f421f6a0837e_3155595721850938215.png?x-oss-process=image%2Fformat%2Cwebp",
    flavor: "魚肉を挟んだハンバーガー。しっかりとしたバンズ、柔らかな魚の切り身、シャキシャキとした具材が織りなす食感のグラデーションに、思わず大口を開けて平らげてしまいたくなる。この本場の味を毎日楽しむために、一家そろってドーンマンポートへ移住した人がいるという噂すらあるが、あながち大袈裟な話でもなさそうだ…",
    link: "https://wiki.hoyolab.com/pc/genshin/entry/10466?lang=ja-jp"
  }

];

function drawFood() {

  const food = foods[Math.floor(Math.random() * foods.length)];

  document.getElementById("foodImage").src = food.image;
  document.getElementById("foodName").textContent = food.name;
  document.getElementById("foodFlavor").textContent = food.flavor;
  document.getElementById("foodLink").href = food.link;

  document.getElementById("card").style.display = "block";
  document.getElementById("drawBtn").style.display = "none";
  document.getElementById("againBtn").style.display = "inline-block";
  document.getElementById("backBtn").style.display = "inline-block";

  document.querySelector(".note").style.display = "none";
}

function backToTitle() {

  document.getElementById("card").style.display = "none";
  document.getElementById("drawBtn").style.display = "inline-block";
  document.getElementById("againBtn").style.display = "none";
  document.getElementById("backBtn").style.display = "none";

  document.querySelector(".note").style.display = "block";
}

</script>

</body>
</html>
